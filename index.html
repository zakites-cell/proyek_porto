<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    
    <!-- Primary Meta Tags -->
    <title>Alex Developer | Interactive 3D Portfolio</title>
    <meta name="title" content="Alex Developer | Interactive 3D Portfolio" />
    <meta name="description" content="Explore a futuristic digital world showcasing creative development, skills, and projects built with React, Three.js, and WebGL." />
    <meta name="keywords" content="Portfolio, 3D Web, Three.js, React, WebGL, Creative Developer, Full-Stack" />
    <meta name="author" content="Alex Developer" />
    <meta name="theme-color" content="#050816" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://alexdev.com/" />
    <meta property="og:title" content="Alex Developer | Interactive 3D Portfolio" />
    <meta property="og:description" content="Explore a futuristic digital world showcasing creative development, skills, and projects." />
    <meta property="og:image" content="https://alexdev.com/og-image.webp" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://alexdev.com/" />
    <meta property="twitter:title" content="Alex Developer | Interactive 3D Portfolio" />
    <meta property="twitter:description" content="Explore a futuristic digital world showcasing creative development, skills, and projects." />
    <meta property="twitter:image" content="https://alexdev.com/og-image.webp" />

    <!-- Icons & Manifest -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="canonical" href="https://alexdev.com/" />

    <!-- Fonts preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    
    <!-- JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org/",
      "@type": "Person",
      "name": "Alex Developer",
      "url": "https://alexdev.com/",
      "jobTitle": "Full-Stack Developer",
      "sameAs": [
        "https://github.com/username",
        "https://linkedin.com/in/username"
      ]
    }
    </script>
  </head>
  <body>
